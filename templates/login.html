<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            width: 380px;
            padding: 40px;
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 16px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #a29bfe, #74b9ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle { color: #8888aa; font-size: 13px; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 14px;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            background: #1a1a2e;
            color: #e0e0f0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
        }
        input:focus { border-color: #6c5ce7; }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #6c5ce7, #5a4bd1);
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(108,92,231,0.4); }
        .error { color: #ff6b6b; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>AI Hub</h1>
        <p style="font-size:13px;color:#888;margin-top:4px;">By Shinwook Yi</p>
        <p class="subtitle">ChatGPT | Gemini | Azure | Claude | Grok</p>
        
        {% if error_msg %}
        <p class="error">{{ error_msg }}</p>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" autofocus required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
