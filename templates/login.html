<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* Spline 3D background */
        .spline-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: auto;
        }
        .spline-bg iframe {
            width: 100%; height: 100%;
            border: none;
        }
        /* Login box floating above Spline */
        .login-box {
            position: relative;
            z-index: 10;
            width: 380px;
            padding: 40px;
            background: rgba(12, 12, 22, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(108, 92, 231, 0.15);
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25), 0 0 60px rgba(108, 92, 231, 0.05);
            pointer-events: auto;
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #a29bfe, #74b9ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle { color: #8888aa; font-size: 13px; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(42, 42, 62, 0.5);
            border-radius: 10px;
            background: rgba(26, 26, 46, 0.4);
            color: #e0e0f0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #6c5ce7; background: rgba(26, 26, 46, 0.6); }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #6c5ce7, #5a4bd1);
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(108,92,231,0.4); }
        .error { color: #ff6b6b; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <!-- Spline 3D Background -->
    <div class="spline-bg">
        <iframe src='https://my.spline.design/particles-DasHLWiUBsm1azwaABCoEgQ3/' frameborder='0' width='100%' height='100%'></iframe>
    </div>

    <!-- Logo in corner -->
    <img src="/static/img/logo.png" alt="Logo" style="position:fixed; top:20px; left:20px; width:70px; height:70px; z-index:20; border-radius:50%; filter:drop-shadow(0 2px 10px rgba(0,0,0,0.4)); pointer-events:none;">

    <div class="login-box">
        <h1>AI Hub</h1>
        <p style="font-size:13px;color:#888;margin-top:4px;">By Shinwook Yi</p>
        <p class="subtitle">ChatGPT | Gemini | Azure | Claude | Grok</p>
        
        {% if error_msg %}
        <p class="error">{{ error_msg }}</p>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" autofocus required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
